<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="St Nicholas of Tolentino RC Church in Easton, Bristol: Mass times, livestream, parish news, outreach, and contact details.">
  <title>St Nicholas of Tolentino | Roman Catholic Parish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <script type="module" src="assets/js/site.js"></script>
</head>
<body data-page="home">
  <div data-site-header></div>

  <main id="main-content">
    <section class="hero home-hero">
      <div class="hero-slides" aria-hidden="true" data-home-hero-slides></div>
      <div class="hero-overlay"></div>

      <div class="shell hero-content">
        <p class="eyebrow" data-home-hero-eyebrow></p>
        <h1 data-home-hero-title></h1>
        <p class="lede" data-home-hero-welcome></p>
        <div class="hero-actions" data-home-hero-actions></div>
      </div>

      <div class="hero-dots" aria-label="Hero images" data-home-hero-dots></div>
    </section>

    <section class="section overlap-section">
      <div class="shell feature-panels" data-home-feature-panels></div>
    </section>

    <section class="section section-light">
      <div class="shell">
        <div class="section-heading center">
          <span class="section-mark" aria-hidden="true"></span>
          <p class="eyebrow" data-home-quick-eyebrow></p>
          <h2 data-home-quick-title></h2>
          <p class="section-copy" data-home-quick-copy></p>
        </div>

        <div class="mass-grid" data-home-quick-mass></div>
      </div>
    </section>

    <section class="section">
      <div class="shell news-layout">
        <div class="section-heading">
          <span class="section-mark" aria-hidden="true"></span>
          <p class="eyebrow">News &amp; Reflections</p>
          <h2>Latest from parish life</h2>
          <p class="section-copy">Weekly highlights, newsletter uploads, and prayer resources are all editable from the same content area.</p>
        </div>

        <div class="news-grid" data-home-news-grid></div>
      </div>
    </section>

    <section class="section section-light">
      <div class="shell mission-grid">
        <div class="mission-copy">
          <div class="section-heading">
            <span class="section-mark" aria-hidden="true"></span>
            <p class="eyebrow" data-home-mission-eyebrow></p>
            <h2 data-home-mission-title></h2>
          </div>
          <div data-home-mission-paragraphs></div>
          <ul class="feature-list" data-home-mission-bullets></ul>
        </div>

        <figure class="mission-image">
          <img data-home-mission-image src="" alt="">
          <figcaption data-home-mission-caption></figcaption>
        </figure>
      </div>
    </section>

    <section class="section">
      <div class="shell">
        <div class="section-heading center">
          <span class="section-mark" aria-hidden="true"></span>
          <p class="eyebrow" data-home-life-eyebrow></p>
          <h2 data-home-life-title></h2>
          <p class="section-copy" data-home-life-copy></p>
        </div>

        <div class="outreach-grid" data-home-life-cards></div>
      </div>
    </section>

    <section class="section section-dark">
      <div class="shell visit-grid">
        <div>
          <p class="eyebrow" data-home-contact-eyebrow></p>
          <h2 data-home-contact-title></h2>
          <p class="section-copy light-copy" data-home-contact-copy></p>
        </div>

        <div class="contact-panel-grid" data-home-contact-cards></div>
      </div>
    </section>
  </main>

  <div data-site-footer></div>
</body>
</html>
